    }
  }
}

/* ---- the road to the stars ---- */
function spaceTick(){
  if(!G.space) G.space={prog:0,stage:0};
  const sp = G.space;
  if(sp.stage>=3) return;
  const crews = aliveTowns().filter(t=>t.techs.spaceflight && t.starvingDays===0 && !warOf(t));
  if(!crews.length) return;
  for(const t of crews){
    const metal = Math.min(t.res.metal, 0.6);
    t.res.metal -= metal;
    sp.prog += 0.25 + metal + (t.techs.computing?0.2:0);
  }
  const lead = crews.reduce((a,b)=>popOf(b)>popOf(a)?b:a);
  if(sp.stage===0 && sp.prog>=60){
    sp.stage=1; sp.prog=0;
    chron('A point of light, made by hands, crosses the night above '+G.planetName+'.', 'astro', lead.id);
    G.faith = clamp(G.faith+4, 0, 100); lead.faith = clamp(lead.faith+6,0,100);
    if(!G.prompts.some(p=>p.kind==='name_craft')){
      queuePrompt({kind:'name_craft', townId:lead.id, args:{stage:1}, input:true, suggest:NG.star(),
        title:'A made star',
        body:'Engineers of '+lead.name+' have set the first vessel into orbit around '+G.planetName+'. The whole world watches it pass. It needs a name.',
        options:['Name it']});
    }
  } else if(sp.stage===1 && sp.prog>=160){
    sp.stage=2; sp.prog=0;
    const target = G.bodies.length ? pick(G.bodies).name : 'the near moon';
    const voyager = spawnPerson(lead,'voyager');
    famePerson(voyager, 'first to set foot beyond '+G.planetName, 5);
    sp.firstFoot = target;
    chron(personLabel(voyager)+' of '+lead.name+' walks upon '+target+' and looks back at '+G.planetName+'.', 'astro', lead.id);
    G.faith = clamp(G.faith+5, 0, 100);
    for(const t of aliveTowns()) t.hapBuf += 6;
  } else if(sp.stage===2 && sp.prog>=320){
    sp.stage=3; sp.prog=0;
    const target = sp.firstFoot || (G.bodies.length ? pick(G.bodies).name : 'the near moon');
    if(!G.prompts.some(p=>p.kind==='name_offworld')){
      queuePrompt({kind:'name_offworld', townId:lead.id, args:{target}, input:true, suggest:NG.town(),
        title:'A second cradle',
        body:'Ships from '+lead.name+' have raised the first homes on '+target+'. Children will be born who have never seen '+G.planetName+'. The settlement awaits its name.',
        options:['Name it']});
    }
  }
}

/* ---- people lifecycle ---- */
function peopleTick(){
  for(const p of G.people){
    if(!p.alive) continue;
    const t = townById(p.townId);
    if(!t || t.dead){ p.alive=false; continue; }
    if(G.day - p.born > p.lifespan){
      p.alive = false;
      if(p.role==='leader' && t.leader===p.id){
        chron(personLabel(p)+', leader of '+t.name+', has died after '+(G.day-p.born)+' days.', 'people', t.id);
        // succession prompt with two candidates
        const mk = ()=>{ const traits=[
            {tag:'the Stern', mil:.12, spi:0, mor:8},
            {tag:'the Gentle', mil:-.12, spi:.05, mor:4},
            {tag:'the Pious', mil:-.04, spi:.18, mor:5},
            {tag:'the Bold', mil:.16, spi:-.04, mor:10},
            {tag:'the Wise', mil:-.06, spi:.04, mor:6},
            {tag:'the Cunning', mil:.06, spi:-.08, mor:7}];
          const tr=pick(traits);
          return {name:NG.person(), epithet:tr.tag, mil:tr.mil, spi:tr.spi, mor:tr.mor}; };
        const a=mk(); let b=mk(); let guard=0; while(b.epithet===a.epithet&&guard++<5) b=mk();
        queuePrompt({kind:'choose_heir', townId:t.id, args:{cands:[a,b]},
          title:'An empty seat in '+t.name,
          body:'Two voices rise to lead '+t.name+': '+a.name+' '+a.epithet+', and '+b.name+' '+b.epithet+'. The council asks the Voice to tip the scales.',
          options:[a.name+' '+a.epithet, b.name+' '+b.epithet]});
      } else if(p.fame>=3){
        chron(personLabel(p)+' of '+t.name+' is laid to rest. Their name will outlive the stones.', 'people', t.id);
      }
    }
  }
  if(G.people.length>400) G.people = G.people.filter(p=>p.alive||p.fame>=3).slice(-380);
}

  {id:'press',   name:'The Copied Word',    desc:'Printing is mastered.',                 cond:()=>aliveTowns().some(t=>t.techs.printing)},
  {id:'engine',  name:'Fire Put to Work',   desc:'Steam engines are mastered.',           cond:()=>aliveTowns().some(t=>t.techs.steam)},
  {id:'wings',   name:'Heavier than Air',   desc:'Flight is mastered.',                   cond:()=>aliveTowns().some(t=>t.techs.flight)},

  {id:'footfall',name:'Footfall',           desc:'Someone walks on another world.',       cond:()=>G.space && G.space.stage>=2},
  {id:'worldseed',name:'Worldseed',         desc:'Found a settlement on another world.',  cond:()=>!!G.offworld},
  {id:'unite',   name:'Unification',        desc:'One banner holds 90% of all claimed land.',cond:()=>{

      const tot=ts.reduce((s,t)=>s+t.tiles.length,0); if(tot<80) return false;
      return ts.some(t=>t.tiles.length/tot>=0.9) && G.stats.townsFallen+G.stats.colonies>0; }},

function worldPop(){ return aliveTowns().reduce((s,t)=>s+popOf(t),0); }
function milestonesTick(){
  for(const m of MILESTONES){
    if(G.milestones[m.id]) continue;
    let okv=false; try{ okv=m.cond(); }catch(e){}
    if(okv){
      G.milestones[m.id] = G.day;
      chron('MILESTONE — '+m.name+': '+m.desc, 'mile');
      allFaith(1.5);
      if(HAS_DOM) UI.toast('Milestone — '+m.name);
    }
  }
}

/* ---- faith & game over ---- */
function faithTick(){
  for(const t of aliveTowns()){
    // slow regression to the mean + outcome-driven drift
    t.faith += (50 - t.faith)*0.0012;
    if(t.starvingDays>5) t.faith -= 0.25;
    if(t.plague) t.faith -= 0.12;
    if(t.happiness>70) t.faith += 0.05;
    t.faith = clamp(t.faith, 0, 100);
  }
  const ts = aliveTowns();
  const tp = worldPop();
  if(tp > (G.stats.peakPop||0)) G.stats.peakPop = tp;
  G.faith = ts.length ? ts.reduce((s,t)=>s+t.faith*popOf(t),0)/Math.max(tp,1) : 0;
}
function checkEnd(){
  if(G.over || G.pendingSettle || !G.towns.length) return;
  if(worldPop() < 1){
    G.over = {kind:'extinct', day:G.day};
    chron('No hearth burns anywhere on '+G.planetName+'. The world falls silent.', 'mile');
  } else if(G.faith <= 1 && G.day > 30){
    G.over = {kind:'forsaken', day:G.day};
    chron('The last believer turns away. The Voice goes unheard on '+G.planetName+'.', 'mile');
  }
  if(G.over && HAS_DOM) UI.gameOver();
}

/* ============================================================
   GAME SETUP & MAIN LOOP
   ============================================================ */
function newGame(seedStr){
  seedStr = (seedStr||'').trim() || ('seed'+Math.floor(Date.now()%100000));
  const h = xmur3(seedStr);
  SEEDN = h();
  WR = mulberry32(h());
  R  = mulberry32(h());
  const world = genWorld();
  G = {
    seedStr, day:0, season:0,
    planetName:'the Unnamed World', starName:null, bodies:[],
    tiles:world.tiles, fert:world.fert,
    TO:new Int16Array(W*H).fill(-1),
    towns:[], people:[], religions:[], species:[],
    townSeq:0, personSeq:0, religionSeq:0, promptSeq:0,
    rel:{}, wars:[], routes:[], plagues:[], ashHeal:[],
    prompts:[], decisions:[], chron:[], milestones:{},
    stats:{wars:0,warDeaths:0,famineDeaths:0,plagueDeaths:0,revolutions:0,colonies:0,townsFallen:0,peakPop:0},
    faith:STARTING_FAITH, nextPromptDay:3,
    lastWarDay:0, lastLine:'', terrainDirty:true, over:null,
    space:{prog:0, stage:0}, offworld:null,
    viewMode:'terrain',
  };
  G.species = genSpeciesPool();
  if(HAS_DOM){
    G.pendingSettle = true;
  } else {
    const spot = findSettleSpot(G.tiles, G.fert, null, 0, 0);
    settleFirst(spot>=0 ? spot : (Math.floor(H/2)*W + Math.floor(W/2)));
  }
}
function settleFirst(idx){
  G.pendingSettle = false;
  const t0 = newTown(idx);
  chron('A handful of people raise the first roofs of '+t0.name+'.', 'town', t0.id);
  chron('You are the Voice. They will ask; you may answer. Their faith is everything.', 'faith');
  queuePrompt({kind:'name_planet', input:true, suggest:NG.planet(),
    title:'A world, unnamed',
    body:'The people of '+t0.name+' look out from their hilltop and wonder what to call the ground beneath them. The Voice may decide.',
    options:['So be it']});
  return t0;
}

function nextDay(n){
  n = n||1;
  if(!G || G.over || G.pendingSettle) return;
  for(let step=0; step<n; step++){
    if(G.over) break;
    if(step>0 && G.prompts.length) break; // fast-forward pauses when the people ask
    G.day++;
    G.season = seasonIdx();
    if(G.day % YEAR === 0) chron('Year '+yearOf()+' begins on '+G.planetName+'.', 'astro');
    const towns = aliveTowns();
    for(const t of towns){
      productionTick(t);
      demographicsTick(t);
      moodTick(t);
      researchTick(t);
      territoryTick(t);
    }
    peopleTick();
    relationsTick();
    tradeTick();
    beliefTick();
    warsTick();
    if(G.wars.some(w=>!w.over)) G.lastWarDay = G.day;
    migrationTick();
    disastersTick();
    discoveryTick();
    spaceTick();
    evaluateDecisions();
    // prune prompts aimed at fallen towns (world-level asks survive)
    G.prompts = G.prompts.filter(p=>{
      if(p.kind==='name_planet'||p.kind==='name_star'||p.kind==='name_body'||p.kind==='name_craft'||p.kind==='name_offworld') return true;
      const t = p.townId!==undefined ? townById(p.townId) : null;
      return t && !t.dead;
    });
    if(G.day >= G.nextPromptDay){
      generatePolicyPrompt();
      G.nextPromptDay = G.day + Math.max(2, ri(3,7) - Math.floor(aliveTowns().length/5));
    }
    autoDecideStale();
    milestonesTick();
    faithTick();
    checkEnd();
  }
  if(HAS_DOM){ render(); UI.updateHUD(); UI.refreshPanel(); UI.maybeShowPrompt(); }
}

/* ============================================================
   RENDERER
   ============================================================ */
let cv=null, ctx=null, terrCv=null, terrMode='';
function initCanvas(){
  if(!HAS_DOM) return;
  cv = document.getElementById('map');
  cv.width = W*SCALE; cv.height = H*SCALE;
  ctx = cv.getContext('2d');
  terrCv = document.createElement('canvas');
  terrCv.width = W; terrCv.height = H;
}
function buildTerrain(){
  const tctx = terrCv.getContext('2d');
  const img = tctx.createImageData(W,H);
  const mode = G.viewMode;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const i=y*W+x, t=G.tiles[i];
    let r,g,b;
    const br = 0.86 + ihash(x,y,SEEDN+7)*0.26;
    if(mode==='fertility' && TINFO[t].land){
      const f = clamp(G.fert[i],0,1.4)/1.4;
      r=20+40*(1-f); g=42+170*f; b=26;
    } else if(mode==='political' && TINFO[t].land){
      const base = 64 + ihash(x,y,SEEDN+9)*24; r=g=b=base;
    } else {
      const c=TINFO[t].col; r=c[0]*br; g=c[1]*br; b=c[2]*br;
    }
    const o=i*4;
    img.data[o]=r; img.data[o+1]=g; img.data[o+2]=b; img.data[o+3]=255;
  }
  tctx.putImageData(img,0,0);
  terrMode = mode;
}
function hueOf(t){ return (t.id*47+13)%360; }
function render(){
  if(!HAS_DOM || !G || !ctx) return;
  if(G.terrainDirty || terrMode!==G.viewMode){ buildTerrain(); G.terrainDirty=false; }
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.drawImage(terrCv, 0,0, W*SCALE, H*SCALE);
  const S = SCALE;
  for(const t of aliveTowns()){
    ctx.fillStyle = 'hsla('+hueOf(t)+',72%,55%,'+(G.viewMode==='political'?0.8:0.4)+')';
    for(const i of t.tiles){ ctx.fillRect((i%W)*S, ((i/W)|0)*S, S, S); }
  }
  ctx.lineWidth = 2;
  for(const t of aliveTowns()){
    ctx.strokeStyle = 'hsl('+hueOf(t)+',75%,62%)';
    ctx.beginPath();
    for(const i of t.tiles){
      const x=i%W, y=(i/W)|0;
      if(x===0   || G.TO[i-1]!==t.id){ ctx.moveTo(x*S, y*S);     ctx.lineTo(x*S, y*S+S); }
      if(x===W-1 || G.TO[i+1]!==t.id){ ctx.moveTo(x*S+S, y*S);   ctx.lineTo(x*S+S, y*S+S); }
      if(y===0   || G.TO[i-W]!==t.id){ ctx.moveTo(x*S, y*S);     ctx.lineTo(x*S+S, y*S); }
      if(y===H-1 || G.TO[i+W]!==t.id){ ctx.moveTo(x*S, y*S+S);   ctx.lineTo(x*S+S, y*S+S); }
    }
    ctx.stroke();
  }
  for(const rt of G.routes){
    const a=townById(rt.a), b=townById(rt.b);
    if(!a||!b||a.dead||b.dead) continue;
    ctx.strokeStyle = rt.sea ? 'rgba(150,195,255,.55)' : 'rgba(255,255,255,.35)';
    ctx.setLineDash([4,5]); ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(a.cap[0]*S+S/2, a.cap[1]*S+S/2);
    ctx.lineTo(b.cap[0]*S+S/2, b.cap[1]*S+S/2);
    ctx.stroke(); ctx.setLineDash([]);
  }
  for(const t of aliveTowns()){
    const x=t.cap[0]*S+S/2, y=t.cap[1]*S+S/2;
    ctx.fillStyle = 'hsl('+hueOf(t)+',80%,60%)';
    ctx.strokeStyle = warOf(t) ? '#ff4747' : '#fff';
    ctx.lineWidth = 2;
    ctx.fillRect(x-4,y-4,8,8);
    ctx.strokeRect(x-4,y-4,8,8);
  }
  const sel = (typeof UI!=='undefined' && UI.selectedTown!=null) ? townById(UI.selectedTown) : null;
  if(sel && !sel.dead){
    ctx.strokeStyle='#fff'; ctx.setLineDash([3,3]); ctx.lineWidth=1;
    ctx.strokeRect(sel.cap[0]*S-5, sel.cap[1]*S-5, S+10, S+10);
    ctx.setLineDash([]);
  }
}

/* ============================================================
   UI LAYER — GenTown-style dashboard: map / day column /
   executive menu / inline chronicle prompts.
   ============================================================ */
const $ = id => HAS_DOM ? document.getElementById(id) : null;
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const POP_E='\u{1F642}', SIZE_E='▢';

const UI = {
  selectedTown:null, popKind:null, chronFilter:'all',
  autoTimer:null, autoSpeed:700, memSaves:{},

  init(){
    $('nextBtn').addEventListener('click', ()=>this.step(1));
    $('ffBtn').addEventListener('click', ()=>this.step(10));
    $('autoBtn').addEventListener('click', ()=>this.toggleAuto());
    $('popClose').addEventListener('click', ()=>this.closePop());
    $('shade').addEventListener('click', e=>{ if(e.target===$('shade')) this.closePop(); });
    $('viewTag').addEventListener('click', ()=>this.cycleView());
    $('map').addEventListener('click', e=>this.mapClick(e));
    document.querySelectorAll('.mitem').forEach(el=>
      el.addEventListener('click', ()=>this.togglePop(el.dataset.pop)));
    $('townRows').addEventListener('click', e=>{
      const r=e.target.closest('[data-town]'); if(r){ this.selectedTown=+r.dataset.town; this.openPop('town'); render(); }
    });
    $('chronFeed').addEventListener('click', e=>this.chronClick(e));
    $('popBody').addEventListener('click', e=>{
      const tw=e.target.closest('[data-town]');
      if(tw){ this.selectedTown=+tw.dataset.town; this.openPop('town'); render(); return; }
      const a=e.target.closest('[data-act]');
      if(a) this.action(a.dataset.act, a.dataset.arg);
    });
    document.addEventListener('keydown', e=>{
      if(e.target.tagName==='INPUT') return;
      const k=e.key.toLowerCase();
      if(k==='escape'){ this.closePop(); return; }
      if(k==='n'||k===' '){ e.preventDefault(); this.step(1); }
      else if(k==='t') this.togglePop('towns');
      else if(k==='k') this.togglePop('tech');
      else if(k==='p') this.togglePop('people');
      else if(k==='o') this.togglePop('planet');
      else if(k==='g') this.togglePop('goals');
      else if(k==='l') this.togglePop('saves');
      else if(k==='i') this.togglePop('info');
      else if(k==='\\') this.togglePop('settings');
    });
  },
  randSeed(){
    const a='abcdefghijkmnopqrstuvwxyz';
    let s=''; for(let i=0;i<4;i++) s+=a[Math.floor(Math.random()*a.length)];
    return s + Math.floor(Math.random()*900+100);
  },
  cycleView(){
    const modes=['terrain','political','fertility'];
    G.viewMode = modes[(modes.indexOf(G.viewMode)+1)%modes.length];
    G.terrainDirty=true; render();
  },
  step(n){
    if(!G || G.over || G.pendingSettle) return;
    nextDay(n);
  },
  toggleAuto(){
    if(this.autoTimer){ this.stopAuto(); return; }
    if(!G || G.over || G.pendingSettle) return;
    this.autoTimer=setInterval(()=>{
      if(!G||G.over){ this.stopAuto(); return; }
      nextDay(1);
    }, this.autoSpeed);
    $('autoBtn').innerHTML='&#9208; Auto';
  },
  stopAuto(){
    if(this.autoTimer){ clearInterval(this.autoTimer); this.autoTimer=null; }
    if(HAS_DOM && $('autoBtn')) $('autoBtn').innerHTML='&#9654; Auto';
  },

  updateHUD(){
    if(!G) return;
    $('dayHead').textContent='Day '+G.day;
    $('planetName').textContent=G.planetName;
    $('townsOf').innerHTML='Towns of <b>'+esc(G.planetName)+'</b>';
    const ts=aliveTowns().slice().sort((a,b)=>popOf(b)-popOf(a));
    let rows='';
    for(const t of ts.slice(0,14)){
      rows+='<div class="trow" data-town="'+t.id+'">'
        +'<span class="nm" style="color:hsl('+hueOf(t)+',75%,65%)">'+esc(t.name)+'</span>'
        +'<span>'+POP_E+Math.round(popOf(t))+' &nbsp;<span style="color:#8ad1ff">'+SIZE_E+'</span>'+t.tiles.length+'</span></div>';
    }
    if(ts.length>14) rows+='<div class="trow" data-pop="towns" style="justify-content:center;color:#888">&#8230; '+(ts.length-14)+' more</div>';
    $('townRows').innerHTML=rows;
    $('totRow').innerHTML = G.pendingSettle ? '' : '<span>Total</span><span>'+POP_E+Math.round(worldPop())+'</span>';
    $('faithFill').style.width=clamp(G.faith,0,100)+'%';
    $('faithFill').style.background=G.faith<25?'#ff5e5e':'#ffd75e';
    $('faithNum').textContent=Math.round(G.faith);
    $('nextBtn').disabled=!!(G.pendingSettle||G.over);
    $('viewTag').textContent='▼ '+G.viewMode.charAt(0).toUpperCase()+G.viewMode.slice(1);
  },

  /* ---- chronicle: events + inline prompts ---- */
  maybeShowPrompt(){ this.renderChron(); this.updateHUD(); },
  renderChron(){
    if(!G) return;
    let h='';
    if(G.pendingSettle){
      h+='<div class="cline"><span class="hint">(?)</span> Tap the map to found your first town. <button data-cact="regen">Regenerate</button></div>';
    }
    for(const p of G.prompts){
      h+='<div class="cline ask"><span class="d">'+p.day+'</span><b style="color:var(--gold)">'+esc(p.title||'A question')+'</b> '
        +esc(p.body||'');
      if(p.input){
        h+=' <input type="text" maxlength="24" id="pin_'+p.id+'" value="'+esc(p.value||p.suggest||'')+'">'
          +' <button data-prompt="'+p.id+'" data-shuf="1">&#10227;</button>';
      }
      (p.options||['So be it']).forEach((label,i)=>{
        const cls = (p.options&&p.options.length===2) ? (i===0?'yes':'no') : 'yes';
        h+=' <button class="'+cls+'" data-prompt="'+p.id+'" data-choice="'+i+'">'+esc(label)+'</button>';
      });
      h+='</div>';
    }
    let shown=0;
    for(let i=G.chron.length-1;i>=0&&shown<120;i--){
      const c=G.chron[i];
      h+='<div class="cline c-'+c.t+'"><span class="d">'+c.d+'</span>'+esc(c.m)+'</div>';
      shown++;
    }
    $('chronFeed').innerHTML=h;
  },
  chronClick(e){
    const b=e.target.closest('button'); if(!b) return;
    if(b.dataset.cact==='regen'){ this.newWorld(this.randSeed()); return; }
    const pid=+b.dataset.prompt;
    const p=G.prompts.find(x=>x.id===pid); if(!p) return;
    if(b.dataset.shuf){ const inp=$('pin_'+pid); if(inp) inp.value=this.freshSuggest(p); return; }
    const inp=$('pin_'+pid);
    const k=G.prompts.indexOf(p); if(k>=0) G.prompts.splice(k,1);
    resolvePrompt(p, +b.dataset.choice, inp?inp.value:null);
    this.renderChron(); this.updateHUD(); render(); this.refreshPanel();
  },
  freshSuggest(p){
    if(p.kind==='name_species' && G.species[p.args.spIdx]) return NG.species(G.species[p.args.spIdx].kind);
    if(p.kind==='name_star'||p.kind==='name_craft') return NG.star();
    if(p.kind==='name_offworld'||p.kind==='name_town') return NG.town();
    return NG.planet();
  },

  /* ---- map ---- */
  mapClick(e){
    if(!G) return;
    const r=$('map').getBoundingClientRect();
    const tx=Math.floor((e.clientX-r.left)/r.width*W);
    const ty=Math.floor((e.clientY-r.top)/r.height*H);
    if(tx<0||ty<0||tx>=W||ty>=H) return;
    if(G.pendingSettle){ this.settleAt(tx,ty); return; }
    let id=G.TO[ty*W+tx];
    if(id!==-1){ const t=townById(id); if(!t||t.dead) id=-1; }
    if(id===-1){
      let bd=6;
      for(const t of aliveTowns()){
        const d=Math.hypot(t.cap[0]-tx,t.cap[1]-ty);
        if(d<bd){ bd=d; id=t.id; }
      }
    }
    if(id!==-1){ this.selectedTown=id; this.openPop('town'); render(); }
  },
  settleAt(tx,ty){
    let best=-1,bd=1e9;
    for(let dy=-7;dy<=7;dy++)for(let dx=-7;dx<=7;dx++){
      const x=tx+dx,y=ty+dy;
      if(x<1||y<1||x>=W-1||y>=H-1) continue;
      const i=y*W+x,t=G.tiles[i];
      if(t!==T.GRASS&&t!==T.FOREST&&t!==T.COAST) continue;
      const d=dx*dx+dy*dy - G.fert[i]*6;
      if(d<bd){ bd=d; best=i; }
    }
    if(best<0){ this.toast('No fertile ground there — try elsewhere'); return; }
    settleFirst(best);
    this.renderChron(); this.updateHUD(); render();
  },
  newWorld(seed){
    this.stopAuto(); this.closePop(); this.selectedTown=null;
    newGame(seed||this.randSeed());
    this.renderChron(); this.updateHUD(); render();
  },

  /* ---- popups ---- */
  togglePop(kind){
    if(this.popKind===kind && $('shade').classList.contains('open')) this.closePop();
    else this.openPop(kind);
  },
  openPop(kind){
    this.popKind=kind;
    $('shade').classList.add('open');
    document.querySelectorAll('.mitem').forEach(el=>el.classList.toggle('on', el.dataset.pop===kind));
    this.refreshPanel();
  },
  closePop(){
    if(HAS_DOM&&$('shade')) $('shade').classList.remove('open');
    this.popKind=null;
    document.querySelectorAll('.mitem').forEach(el=>el.classList.remove('on'));
  },
  refreshPanel(){
    if(!G||!this.popKind||!$('shade').classList.contains('open')) return;
    const k=this.popKind;
    let title='',sub='',html='';
    if(k==='town'){
      const t=this.selectedTown!=null?townById(this.selectedTown):null;
      if(!t){ this.popKind='towns'; return this.refreshPanel(); }
      title='<span style="color:hsl('+hueOf(t)+',75%,65%)">'+esc(t.name)+'</span>'; sub='Town'; html=this.townHTML(t);
    }
    else if(k==='towns'){ title='Towns'; sub='of '+esc(G.planetName); html=this.townsHTML(); }
    else if(k==='tech'){ title='Knowledge'; sub='what the world has learned'; html=this.techHTML(); }
    else if(k==='people'){ title='People'; sub='names worth remembering'; html=this.peopleHTML(); }
    else if(k==='planet'){ title=esc(G.planetName); sub='Planet'; html=this.planetHTML(); }
    else if(k==='goals'){ title='Goals'; sub='milestones of a civilization'; html=this.goalsHTML(); }
    else if(k==='settings'){ title='Settings'; sub=''; html=this.settingsHTML(); }
    else if(k==='saves'){ title='Saves'; sub='three slots'; html=this.savesHTML(); }
    else if(k==='info'){ title='Info'; sub='how to play'; html=this.infoHTML(); }
    else if(k==='over'){ title=$('popTitle').dataset.overTitle||'The End'; sub=''; html=this.overHTML(); }
    $('popTitle').innerHTML='<div class="t">'+title+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'');
    $('popBody').innerHTML=html;
  },
  prow(k,v){ return '<div class="prow"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'; },
  bar(val,col){ return Math.round(val)+'<span class="miniBar"><i style="width:'+clamp(val,0,100)+'%;background:'+(col||'#fff')+'"></i></span>'; },
  cultureTags(t){
    const c=t.culture,tags=[];
    if(c.mil>.25)tags.push('martial'); if(c.mil<-.25)tags.push('peaceable');
    if(c.spi>.3)tags.push('devout');   if(c.spi<-.3)tags.push('worldly');
    if(c.ope>.3)tags.push('open');     if(c.ope<-.3)tags.push('insular');
    if(c.tra>.3)tags.push('tradition-bound'); if(c.tra<-.3)tags.push('restless');
    return tags.length?tags.map(x=>'<span class="tag">'+x+'</span>').join(''):'<span class="none">unremarkable</span>';
  },

    h+=this.prow('Era', esc(ERAS[t.era]));

    const w=warOf(t);
    if(w){
      const o=townById(w.a===t.id?w.b:w.a);
      h+=this.prow('<span class="c-war">At war</span>', 'vs '+esc(o?o.name:'?')+' — exhaustion '+Math.round(w.a===t.id?w.exA:w.exB));
    }
    const tags=[];
    if(t.starvingDays>0)tags.push('<span class="tag c-disaster">starving</span>');

    if(tags.length) h+=this.prow('Status', tags.join(''));

    const rels=aliveTowns().filter(o=>o.id!==t.id)
      .map(o=>({o,r:getRel(t.id,o.id)}))

    if(rels.length){

  },

  action(act,arg){
    if(act==='view'){ G.viewMode=arg; G.terrainDirty=true; render(); this.refreshPanel(); this.updateHUD(); }
    else if(act==='speed'){ this.autoSpeed=+arg; if(this.autoTimer){ this.stopAuto(); this.toggleAuto(); } this.refreshPanel(); }
    else if(act==='save'){ this.saveSlot(arg); }
    else if(act==='load'){ this.loadSlot(arg); }
    else if(act==='newworld'){ const f=$('seedField'); this.newWorld(f&&f.value.trim()?f.value.trim():this.randSeed()); }

  /* ---- saves ---- */
  snapshot(){
    const o={};
    for(const k in G){
      if(k==='tiles') o.tiles=Array.from(G.tiles);
      else if(k==='fert') o.fert=Array.from(G.fert).map(v=>Math.round(v*1000)/1000);
      else if(k==='TO') o.TO=Array.from(G.TO);
      else if(k==='towns') o.towns=G.towns.map(t=>{
        const c=Object.assign({},t);
        c.terr=null; c.terrDirty=true;
        c.plague=t.plague?G.plagues.indexOf(t.plague):-1;
        return c;
      });
      else o[k]=G[k];
    }
    return JSON.stringify(o);
  },
  restoreSnap(json){
    const o=JSON.parse(json);
    o.tiles=Uint8Array.from(o.tiles);
    o.fert=Float32Array.from(o.fert);
    o.TO=Int16Array.from(o.TO);
    for(const t of o.towns){
      t.plague=(typeof t.plague==='number'&&t.plague>=0&&o.plagues[t.plague])?o.plagues[t.plague]:null;
    }
    G=o; G.terrainDirty=true;
    const h0=xmur3(G.seedStr); SEEDN=h0();
    R=mulberry32(xmur3(G.seedStr+'@'+G.day)());
  },
  saveSlot(n){
    if(!G||G.pendingSettle) return;
    const data=this.snapshot();
    try{ localStorage.setItem('worldseed_slot'+n,data); this.toast('Saved — slot '+n); }
    catch(e){ this.memSaves[n]=data; this.toast('Saved for this session — slot '+n); }
    this.refreshPanel();
  },
  loadSlot(n){
    let data=null;
    try{ data=localStorage.getItem('worldseed_slot'+n); }catch(e){ data=null; }
    if(!data) data=this.memSaves[n];
    if(!data){ this.toast('Slot '+n+' is empty'); return; }
    try{
      this.restoreSnap(data);
      this.stopAuto(); this.closePop();
      render(); this.updateHUD(); this.renderChron();
      this.toast('Loaded — slot '+n);
      if(G.over) this.gameOver();
    }catch(e){ this.toast('That save could not be read'); }
  },
  toast(msg){
    if(!HAS_DOM) return;
    const d=document.createElement('div'); d.className='toast'; d.textContent=msg;
    $('toasts').appendChild(d);
    setTimeout(()=>d.remove(),4200);
  },
  gameOver(){
    this.stopAuto();
    const o=G.over; if(!o) return;
    $('popTitle').dataset.overTitle = o.kind==='forsaken'?'THE VOICE FADES':'A SILENT WORLD';
    this.openPop('over');
    this.updateHUD();
  },
};

/* ---- boot ---- */
if(HAS_DOM){
  initCanvas();
  UI.init();
  newGame(UI.randSeed());
  UI.renderChron(); UI.updateHUD(); render();
} else {
  // headless smoke test (node)
  const seeds=['alpha','omega','gamma'];
  const horizon={alpha:420,omega:420,gamma:2200};
  for(const s of seeds){
    try{
      newGame(s);
      while(G.day<horizon[s] && !G.over){
        nextDay(1);
        while(G.prompts.length){
          const p=G.prompts.shift();
          resolvePrompt(p, p.options?Math.floor(Math.random()*p.options.length):0, null);
        }
      }
      const ts=aliveTowns();
      const era=ts.length?Math.max.apply(null,ts.map(t=>t.era)):0;
      const bad=Number.isNaN(G.faith)||ts.some(t=>Number.isNaN(popOf(t)));
      console.log('[test] seed='+s+' day='+G.day+' towns='+ts.length+' pop='+Math.round(worldPop())
        +' era='+era+' faith='+G.faith.toFixed(1)+' chron='+G.chron.length
        +' wars='+G.stats.wars+' relig='+G.religions.length
        +' space='+(G.space?G.space.stage:0)+(G.offworld?(' colony='+G.offworld.name):'')
        +(G.over?(' OVER:'+G.over.kind):'')+(bad?' !!NaN':''));
    }catch(err){
      console.log('[test] seed='+s+' CRASH day '+(G?G.day:'?')+': '+err.stack.split('\n').slice(0,3).join(' | '));
    }
  }
}

</script>
